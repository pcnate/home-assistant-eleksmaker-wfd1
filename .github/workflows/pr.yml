name: PR Checks

on:
  pull_request:
    branches: [master, main, development]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Rust binaries
        run: docker build -t eleks-rust -f build/Dockerfile .

      - name: Extract binaries
        run: |
          mkdir -p dist
          docker run --rm -v ${{ github.workspace }}/dist:/host eleks-rust cp /out/eleks-monitor.exe /out/eleks-tray.exe /host/

      - name: Verify outputs
        run: |
          ls -lh dist/eleks-monitor.exe
          ls -lh dist/eleks-tray.exe
          test -f dist/eleks-monitor.exe
          test -f dist/eleks-tray.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/*.exe
