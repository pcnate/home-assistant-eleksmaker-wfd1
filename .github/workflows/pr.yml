name: PR Checks

on:
  pull_request:
    branches: [master, main, development]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Rust binaries
        run: docker build -t eleks-rust -f build/Dockerfile .

      - name: Extract binaries
        run: |
          mkdir -p dist
          docker run --rm -v ${{ github.workspace }}/dist:/host eleks-rust cp /out/eleks-monitor.exe /out/eleks-tray.exe /host/

      - name: Verify outputs
        run: |
          test -f dist/eleks-monitor.exe
          test -f dist/eleks-tray.exe

          MONITOR_SIZE=$(stat -c%s dist/eleks-monitor.exe)
          TRAY_SIZE=$(stat -c%s dist/eleks-tray.exe)

          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Binary | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| eleks-monitor.exe | $(numfmt --to=iec $MONITOR_SIZE) |" >> $GITHUB_STEP_SUMMARY
          echo "| eleks-tray.exe | $(numfmt --to=iec $TRAY_SIZE) |" >> $GITHUB_STEP_SUMMARY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/*.exe
