name: Release

on:
  push:
    branches: [master, main, development]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Rust binaries
        run: |
          docker build -t eleks-rust -f build/Dockerfile .
          mkdir -p dist
          docker run --rm -v ${{ github.workspace }}/dist:/host eleks-rust cp /out/eleks-monitor.exe /out/eleks-tray.exe /host/

      - name: Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Upload binaries
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/*.exe

      - name: Summary
        if: always()
        run: |
          echo "## Release" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.semantic.outputs.new_release_published }}" == "true" ]; then
            echo "**Version:** \`${{ steps.semantic.outputs.new_release_version }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Binary | Size |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
            for f in dist/*.exe; do
              echo "| $(basename $f) | $(numfmt --to=iec $(stat -c%s $f)) |" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "No release created." >> $GITHUB_STEP_SUMMARY
          fi

  installer:
    name: Build Installer
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist

      - name: Build installer
        run: iscc build/setup.iss

      - name: Upload installer to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v${{ needs.release.outputs.new_release_version }} dist/EleksWFD-Monitor-Setup.exe#"EleksWFD Installer"

      - name: Summary
        run: |
          $size = (Get-Item dist/EleksWFD-Monitor-Setup.exe).Length
          $sizeMB = [math]::Round($size / 1MB, 1)
          echo "## Installer" >> $env:GITHUB_STEP_SUMMARY
          echo "**Version:** ``${{ needs.release.outputs.new_release_version }}``" >> $env:GITHUB_STEP_SUMMARY
          echo "**Size:** ${sizeMB}MB" >> $env:GITHUB_STEP_SUMMARY
