esphome:
  name: eleksmaker-home
  friendly_name: eleksmaker home


external_components:
  - source:
      type: git
      url: https://github.com/pcnate/home-assistant-eleksmaker-wfd1
      ref: development
      path: components
    components: [elekswfd]

elekswfd:
  id: my_eleks_wfd
  i2c_id: bus_i2c
  rtc_address: 0x68
  tm1680_address: 0x73
  mic_pin: 32
  a_key_pin: 27
  b_key_pin: 26
  c_key_pin: 25
  time_id: ds3231_rtc
  cpu_usage: remote_cpu_usage
  gpu_usage: remote_gpu_usage
  ram_usage: remote_ram_usage
  weather: remote_weather
  bar_chart_1: remote_cpu_temp
  bar_chart_2: remote_gpu_temp

  show_speaker: show_speaker
  show_microphone: show_microphone
  show_headsets: show_headsets
  show_record: show_record
  show_settings: show_settings
  show_desktop: show_desktop
  show_server: show_server
  show_watch: show_watch
  show_hourglass: show_hourglass
  show_battery: show_battery
  show_calendar: show_calendar
  show_hotspot: show_hotspot
  # show_time: show_time
  show_mic: show_mic
  show_logo: show_logo
  gif_data: gif_data_sensor
  logo_data: logo_data_sensor
  upper_text: upper_text_sensor
  lower_text: lower_text_sensor

globals:

  - id: show_speaker_state
    type: bool
    restore_value: True
    initial_value: 'true'

  - id: show_microphone_state
    type: bool
    restore_value: True
    initial_value: 'true'

  - id: show_headsets_state
    type: bool
    restore_value: True
    initial_value: 'true'

  - id: show_record_state
    type: bool
    restore_value: True
    initial_value: 'true'

  - id: show_settings_state
    type: bool
    restore_value: True
    initial_value: 'true'

  - id: show_desktop_state
    type: bool
    restore_value: True
    initial_value: 'true'

  - id: show_server_state
    type: bool
    restore_value: True
    initial_value: 'true'

  - id: show_watch_state
    type: bool
    restore_value: True
    initial_value: 'true'

  - id: show_hourglass_state
    type: bool
    restore_value: True
    initial_value: 'true'

  - id: show_battery_state
    type: bool
    restore_value: True
    initial_value: 'true'

  - id: show_calendar_state
    type: bool
    restore_value: True
    initial_value: 'true'

  - id: show_hotspot_state
    type: bool
    restore_value: True
    initial_value: 'true'

  - id: show_time_state
    type: bool
    restore_value: True
    initial_value: 'true'


text_sensor:
  - platform: homeassistant
    id: gif_data_sensor
    entity_id: input_text.eleksmaker_gif
    internal: true

  - platform: homeassistant
    id: logo_data_sensor
    entity_id: input_text.eleksmaker_logo
    internal: true

  - platform: homeassistant
    id: upper_text_sensor
    entity_id: input_text.eleksmaker_upper
    internal: true

  - platform: homeassistant
    id: lower_text_sensor
    entity_id: input_text.eleksmaker_lower
    internal: true

  - platform: template
    id: seg13_text
    name: "13 Segment Display"
    internal: false
    update_interval: never
    icon: "mdi:led-variant"
    lambda: |-
      return std::string("123456");

  - platform: template
    id: seg7_text
    name: "7 Segment Display"
    internal: false
    update_interval: never
    icon: "mdi:led-outline"
    lambda: |-
      return std::string("123456");

  # grab the weather conditions
  - platform: homeassistant
    id: weather_condition
    entity_id: weather.forecast_home
    internal: true

binary_sensor:
  - platform: template
    name: "Tray1 speaker"
    id: show_speaker
    icon: "mdi:speaker"
    lambda: return id(show_speaker_state);

  - platform: template
    name: "Tray1 microphone"
    id: show_microphone
    icon: "mdi:microphone"
    lambda: return id(show_microphone_state);

  - platform: template
    name: "Tray1 headsets"
    id: show_headsets
    icon: "mdi:headphones"
    lambda: return id(show_headsets_state);

  - platform: template
    name: "Tray1 record"
    id: show_record
    icon: "mdi:record-rec"
    lambda: return id(show_record_state);

  - platform: template
    name: "Tray2 settings"
    id: show_settings
    icon: "mdi:cog"
    lambda: return id(show_settings_state);

  - platform: template
    name: "Tray2 desktop"
    id: show_desktop
    icon: "mdi:monitor"
    lambda: return id(show_desktop_state);

  - platform: template
    name: "Tray2 server"
    id: show_server
    icon: "mdi:server"
    lambda: return id(show_server_state);

  - platform: template
    name: "Tray3 watch"
    id: show_watch
    icon: "mdi:watch"
    lambda: return id(show_watch_state);

  - platform: template
    name: "Tray3 hourglass"
    id: show_hourglass
    icon: "mdi:hourglass-half-full"
    lambda: return id(show_hourglass_state);

  - platform: template
    name: "Tray3 battery"
    id: show_battery
    icon: "mdi:battery"
    lambda: return id(show_battery_state);

  - platform: template
    name: "Tray4 calendar"
    id: show_calendar
    icon: "mdi:calendar"
    lambda: return id(show_calendar_state);

  - platform: template
    name: "Tray4 hotspot"
    id: show_hotspot
    icon: "mdi:wifi"
    lambda: return id(show_hotspot_state);

  - platform: template
    name: "Show time"
    id: show_time
    icon: "mdi:clock-digital"
    lambda: return id(show_time_state);

  # - platform: homeassistant
  #   id: show_mic
  #   entity_id: sensor.bla_nate_t1d3l_connected
  #   icon: "mdi:microphone"
  - platform: template
    id: show_mic
    lambda: return 0;

  - platform: template
    id: show_logo
    lambda: return 1;

# map to other devices in HA
sensor:
  - platform: template
    id: test_setting
    lambda: return 0;
    internal: true

  - platform: homeassistant
    id: remote_cpu_usage
    entity_id: sensor.YOUR_MACHINE_NAME_cpu_usage
    internal: true

  - platform: homeassistant
    id: remote_ram_usage
    entity_id: sensor.YOUR_MACHINE_NAME_ram_usage
    internal: true

  - platform: homeassistant
    id: remote_gpu_usage
    entity_id: sensor.YOUR_MACHINE_NAME_gpu_usage
    internal: true

  - platform: homeassistant
    id: remote_cpu_temp
    entity_id: sensor.YOUR_MACHINE_NAME_cpu_temp
    internal: true

  - platform: homeassistant
    id: remote_gpu_temp
    entity_id: sensor.YOUR_MACHINE_NAME_gpu_temp
    internal: true

  # calculate the numeric weather value
  - platform: template
    id: remote_weather
    name: "Weather Condition"
    lambda: |-
      if ( id(weather_condition).has_state() ) {
        std::string state = id(weather_condition).state;
        ESP_LOGI("weather_numeric", "HA weather state: '%s'", state.c_str());
        if (state == "sunny") {
          return 1.0;
        } else if (state.find("cloud") != std::string::npos) {
          return 2.0;
        } else if (state == "rainy") {
          return 3.0;
        }
        return 0.0; // state is known but not matched
      } else {
        return 0.0;
      }

esp32:
  board: esp32dev
  framework:
    type: arduino

web_server:
  port: 80
  version: 2

captive_portal:

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key
  on_client_connected:
    then:
      - lambda: |-
          id(show_speaker).publish_state(true);
  on_client_disconnected:
    then:
      - lambda: |-
          id(show_speaker).publish_state(false);

ota:
  - platform: esphome
    password: !secret ota_password
    on_begin:
      then:
        - lambda: id(my_eleks_wfd).setOtaProgress(0);
    on_progress:
      then:
        - lambda: id(my_eleks_wfd).setOtaProgress((int)x);
    on_end:
      then:
        - lambda: id(my_eleks_wfd).setOtaProgress(-1);
    on_error:
      then:
        - lambda: id(my_eleks_wfd).setOtaProgress(-1);

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: 192.168.2.85
  fast_connect: true

  on_connect:
    then:
      - lambda: |-
          id(show_hotspot).publish_state(true);
  on_disconnect:
    then:
      - lambda: |-
          id(show_hotspot).publish_state(false);

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  # ap:
  #   ssid: "Eleksmaker-Home Fallback Hotspot"
  #   password: "yiQrdf9shCIE"

i2c:
  sda: GPIO21
  scl: GPIO22
  id: bus_i2c
  frequency: 200kHz
  # scan: true

time:
  - platform: sntp
    id: sntp_time
    update_interval: 15s
    servers:
      - ntp.unr34l.net
    on_time_sync:
      then:
        - ds1307.write_time:

  - platform: ds1307
    id: ds3231_rtc
    i2c_id: bus_i2c
    address: 0x68
    update_interval: 30s
    timezone: America/Chicago


switch:
  - platform: template
    name: "Tray1 Show Speaker"
    id: remote_show_speaker
